<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d9488" />
    <title>店内検索 | AISA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <div class="search-wrap">
          <label class="sr-only" for="store-search">商品を検索</label>
          <span class="search-icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7" />
              <path d="M20 20l-3-3" stroke-linecap="round" />
            </svg>
          </span>
          <input
            id="store-search"
            class="search-input"
            type="search"
            inputmode="search"
            enterkeyhint="search"
            placeholder="例：牛乳　 /　 おにぎり　 /　 洗剤"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="store-filter-row">
          <label class="store-filter-label" for="store-filter">店舗（Algolia フィルタ）</label>
          <input
            id="store-filter"
            class="store-filter-input"
            type="text"
            inputmode="text"
            placeholder="storeId（.env の VITE_DEFAULT_STORE_ID で初期化可）"
            autocomplete="off"
          />
        </div>
      </header>

      <main class="main">
        <section class="results-section" aria-label="検索結果">
          <h2 class="results-heading">検索結果</h2>
          <div id="search-results" class="search-results"></div>
        </section>

        <section class="map-section" id="map-section" aria-label="店内マップ">
          <div class="map-frame">
            <div class="map-placeholder" role="img" aria-label="店内マップのプレースホルダー">
              <div class="map-grid"></div>
              <div class="map-aisle map-aisle--1"></div>
              <div class="map-aisle map-aisle--2"></div>
              <div class="map-label">フロアマップ（プレビュー）</div>
            </div>
            <div class="map-pin" id="map-pin" hidden aria-hidden="true" title="目的地の目安">
              <span class="map-pin-emoji">📍</span>
            </div>
          </div>
        </section>

        <section class="route-panel" aria-label="自然言語によるルート案内">
          <p class="route-kicker" id="route-kicker">ルート案内</p>
          <p class="route-lead">検索結果の「地図で見る」で、ここに案内が表示されます。</p>
          <p class="route-text" id="route-natural">
            商品を検索して、カードの <strong class="route-highlight">地図で見る</strong> をタップしてください。
          </p>
          <p class="map-hint-customer" id="map-hint-line"></p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
