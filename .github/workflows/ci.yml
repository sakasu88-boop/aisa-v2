# PR と feature ブランチ push 時: ビルド + verify（main 直 push は deploy ワークフロー側で検証）
name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches-ignore:
      - main
      - master

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin-app and customer-app
        run: npm run build:all

      - name: Verify customer bundle (no Admin API key markers)
        run: npm run verify:customer:bundle
